name: CI-CD

permissions:
  contents: write
  packages: write

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend
  KUBE_NAMESPACE: shop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build backend image
        run: docker build -t $BACKEND_IMAGE:${{ github.sha }} ./src/backend/

      - name: Push backend image
        run: docker push $BACKEND_IMAGE:${{ github.sha }}

      - name: Build frontend image
        run: docker build -t $FRONTEND_IMAGE:${{ github.sha }} ./src/frontend/

      - name: Push frontend image
        run: docker push $FRONTEND_IMAGE:${{ github.sha }}
