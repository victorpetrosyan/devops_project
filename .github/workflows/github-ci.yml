name: CI-CD

permissions:
  contents: write
  packages: write

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend
  KUBE_NAMESPACE: shop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build backend image
        run: docker build -t $BACKEND_IMAGE:${{ github.sha }} ./src/backend/

      - name: Push backend image
        run: docker push $BACKEND_IMAGE:${{ github.sha }}

      - name: Build frontend image
        run: docker build -t $FRONTEND_IMAGE:${{ github.sha }} ./src/frontend/

      - name: Push frontend image
        run: docker push $FRONTEND_IMAGE:${{ github.sha }}

      - name: Update values.yaml
        run: |
          yq -i '.backend.image.tag = "${{ github.sha }}"' ./shop_chart/values.yaml
          yq -i '.frontend.image.tag = "${{ github.sha }}"' ./shop_chart/values.yaml

      - name: Commit updated values
        run: |
          git config user.name github-actions
          git config user.email petrosyan.victor05@gmail.com

          git add ./shop_chart/values.yaml
          git commit -m "Update image tag ${{ github.sha }}" || echo "No changes"

          git push
